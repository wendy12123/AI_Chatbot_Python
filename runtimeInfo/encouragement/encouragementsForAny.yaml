    - "Every 'Hello World' is the start of a superpower."
    - "You can do anything you set your mind to!"
  confidence: # Score >= 40
    - "Have enough confidence to believe in yourself"
    - "if(life.gives('bugs')):\n    debug()\nelse:\n    keep_going()"
